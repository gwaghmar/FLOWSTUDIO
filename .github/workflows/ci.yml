name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: flowchart_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/flowchart_test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @flowchart/core build
      - run: |
          echo "AUTH_SECRET=ci-secret-at-least-32-characters-long" >> apps/web/.env.local
          echo "DATABASE_URL=${DATABASE_URL}" >> apps/web/.env.local
      - run: pnpm --filter @flowchart/web db:push
      - run: pnpm --filter @flowchart/web lint
      - run: pnpm --filter @flowchart/web build
      - run: pnpm test:unit
