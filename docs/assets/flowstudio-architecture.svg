<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">FlowStudio architecture diagram</title>
  <desc id="desc">Mermaid-style flowchart showing user prompt, web app, AI planning, core diagram registry, renderers, exports, database, sharing, MCP server, and CLI.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .node { fill: #ffffff; stroke: #64748b; stroke-width: 2; rx: 10; }
      .primary { fill: #eef2ff; stroke: #4f46e5; }
      .data { fill: #ecfdf5; stroke: #059669; }
      .output { fill: #fff7ed; stroke: #ea580c; }
      .text { fill: #0f172a; font: 600 18px Arial, sans-serif; text-anchor: middle; dominant-baseline: middle; }
      .small { fill: #475569; font: 500 14px Arial, sans-serif; text-anchor: middle; dominant-baseline: middle; }
      .edge { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .title { fill: #0f172a; font: 700 28px Arial, sans-serif; text-anchor: middle; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1120" height="520" rx="22"/>
  <text class="title" x="560" y="48">FlowStudio Diagram Pipeline</text>

  <rect class="node primary" x="50" y="130" width="160" height="74" rx="10"/>
  <text class="text" x="130" y="158">User prompt</text>
  <text class="small" x="130" y="184">plain language</text>

  <rect class="node primary" x="290" y="130" width="170" height="74" rx="10"/>
  <text class="text" x="375" y="158">Next.js app</text>
  <text class="small" x="375" y="184">editor + API</text>

  <rect class="node" x="535" y="130" width="180" height="74" rx="10"/>
  <text class="text" x="625" y="158">AI planner</text>
  <text class="small" x="625" y="184">type + intent</text>

  <rect class="node" x="790" y="130" width="210" height="74" rx="10"/>
  <text class="text" x="895" y="158">Core registry</text>
  <text class="small" x="895" y="184">prompts + schemas</text>

  <rect class="node output" x="790" y="294" width="210" height="74" rx="10"/>
  <text class="text" x="895" y="322">Renderers</text>
  <text class="small" x="895" y="348">8 diagram engines</text>

  <rect class="node output" x="535" y="294" width="180" height="74" rx="10"/>
  <text class="text" x="625" y="322">Export</text>
  <text class="small" x="625" y="348">PNG + SVG</text>

  <rect class="node data" x="290" y="294" width="170" height="74" rx="10"/>
  <text class="text" x="375" y="322">Supabase</text>
  <text class="small" x="375" y="348">projects + auth</text>

  <rect class="node data" x="50" y="294" width="160" height="74" rx="10"/>
  <text class="text" x="130" y="322">Share</text>
  <text class="small" x="130" y="348">embed + OG</text>

  <rect class="node" x="290" y="410" width="170" height="58" rx="10"/>
  <text class="text" x="375" y="439">CLI</text>

  <rect class="node" x="535" y="410" width="180" height="58" rx="10"/>
  <text class="text" x="625" y="439">MCP server</text>

  <path class="edge" d="M 210 167 L 282 167"/>
  <path class="edge" d="M 460 167 L 527 167"/>
  <path class="edge" d="M 715 167 L 782 167"/>
  <path class="edge" d="M 895 204 L 895 286"/>
  <path class="edge" d="M 790 331 L 723 331"/>
  <path class="edge" d="M 290 204 C 250 238 250 289 282 318"/>
  <path class="edge" d="M 290 331 L 218 331"/>
  <path class="edge" d="M 460 439 L 527 439 C 735 439 763 254 823 205"/>
  <path class="edge" d="M 625 410 L 625 384 C 625 251 744 220 822 199"/>
</svg>
